version: 2

builds:
  - main: ./cmd/backdrop
    binary: backdrop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

dockers:
  - image_templates:
      - "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}-amd64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64

  - image_templates:
      - "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}-arm64"
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}"
    image_templates:
      - "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}-amd64"
      - "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/josepmedialdea/backdrop:latest"
    image_templates:
      - "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}-amd64"
      - "ghcr.io/josepmedialdea/backdrop:{{ .Tag }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
